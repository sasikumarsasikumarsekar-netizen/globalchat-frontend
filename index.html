<!DOCTYPE html>
<html>
<head>
    <title>GlobalChat Firebase</title>

    <style>
        body { font-family: Arial; margin:0; background:#ece5dd; }
        .header { background:#075E54; color:white; padding:15px; }
        .container { display:flex; height:90vh; }
        .contacts { width:25%; background:white; border-right:1px solid #ccc; overflow-y:auto; }
        .contact { padding:10px; border-bottom:1px solid #eee; cursor:pointer; }
        .contact:hover { background:#f5f5f5; }
        .chat-area { width:75%; display:flex; flex-direction:column; }
        .chat-box { flex:1; overflow-y:auto; padding:10px; background:#e5ddd5; }
        .msg { padding:10px; margin:5px; border-radius:10px; max-width:60%; }
        .me { background:#dcf8c6; margin-left:auto; }
        .other { background:white; }
        .input-box { display:flex; padding:10px; background:#f0f0f0; }
        input { padding:8px; margin-right:5px; }
        button { padding:8px 15px; background:#25D366; color:white; border:none; }
    </style>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body>

<div class="header">🔥 GlobalChat (Firebase)</div>

<div style="padding:10px;">
    <input id="name" placeholder="Your Name">
    <button onclick="connect()">Connect</button>
</div>

<div class="container">
    <div class="contacts" id="contacts"></div>

    <div class="chat-area">
        <div class="chat-box" id="chatBox"></div>

        <div class="input-box">
            <input id="message" placeholder="Type message..." style="flex:1;">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
/* 🔥 PASTE YOUR FIREBASE CONFIG HERE */
const firebaseConfig = {
  apiKey: "AIzaSyA6hyqYaNGK87vLRQBDuQqrcUS3psn52sA",
  authDomain: "globalchat-1e2d3.firebaseapp.com",
  databaseURL: "https://console.firebase.google.com/project/globalchat-1e2d3/database/globalchat-1e2d3-default-rtdb/data/~2F",
  projectId: "globalchat-1e2d3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName = "";
let selectedUser = "";

// CONNECT
function connect() {
    myName = document.getElementById("name").value;

    db.ref("users/" + myName).set(true);

    db.ref("users").on("value", snapshot => {
        let users = snapshot.val();
        let contacts = document.getElementById("contacts");
        contacts.innerHTML = "";

        for (let user in users) {
            if (user === myName) continue;

            let div = document.createElement("div");
            div.innerText = user;
            div.className = "contact";

            div.onclick = () => {
                selectedUser = user;
            };

            contacts.appendChild(div);

            if (!selectedUser) selectedUser = user;
        }
    });

    db.ref("messages").on("child_added", snapshot => {
        let msg = snapshot.val();

        if (
            (msg.sender === myName && msg.receiver === selectedUser) ||
            (msg.sender === selectedUser && msg.receiver === myName)
        ) {
            showMessage(msg);
        }
    });
}

// SEND
function sendMessage() {
    let text = document.getElementById("message").value;

    if (!selectedUser) {
        alert("No users!");
        return;
    }

    db.ref("messages").push({
        sender: myName,
        receiver: selectedUser,
        text: text
    });

    document.getElementById("message").value = "";
}

// SHOW MSG
function showMessage(msg) {
    let chat = document.getElementById("chatBox");

    let div = document.createElement("div");
    div.classList.add("msg");
    div.classList.add(msg.sender === myName ? "me" : "other");

    div.innerText = msg.sender + ": " + msg.text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
