<!DOCTYPE html>
<html>
<head>
    <title>GlobalChat</title>

    <style>
        body {
            font-family: Arial;
            background: #ece5dd;
            margin: 0;
        }

        .header {
            background: #075E54;
            color: white;
            padding: 15px;
            font-size: 20px;
        }

        .top-bar {
            padding: 10px;
            background: #f0f0f0;
        }

        .chat-box {
            height: 100%;
            overflow-y: scroll;
            background: #e5ddd5;
            padding: 10px;
        }

        .msg {
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            max-width: 60%;
            clear: both;
        }

        .me {
            background: #dcf8c6;
            margin-left: auto;
            text-align: right;
        }

        .other {
            background: white;
            margin-right: auto;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background: #f0f0f0;
        }

        input, select {
            padding: 8px;
            margin-right: 5px;
        }

        button {
            padding: 8px 15px;
            background: #25D366;
            border: none;
            color: white;
            cursor: pointer;
        }

        .user {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #ddd;
        }

        .user:hover {
            background: #f5f5f5;
        }

        .active {
            background: #d9fdd3;
        }
    </style>
</head>

<body>

<div class="header">
    🌍 GlobalChat
</div>

<div class="top-bar">
    <input id="name" placeholder="Your Name">
    
    <select id="lang">
        <option value="en">English</option>
        <option value="ta">Tamil</option>
        <option value="hi">Hindi</option>
    </select>

    <button onclick="connect()">Connect</button>
</div>

<!-- 🔥 CONTACT + CHAT LAYOUT -->
<div style="display:flex; height:500px;">

    <!-- LEFT: CONTACT LIST -->
    <div style="width:30%; background:#fff; border-right:1px solid #ccc; overflow-y:auto;" id="usersList">
        <h3 style="padding:10px;">Contacts</h3>
    </div>

    <!-- RIGHT: CHAT -->
    <div style="width:70%; display:flex; flex-direction:column;">
        
        <div class="chat-box" id="chatBox"></div>

        <div class="input-box">
            <input id="message" placeholder="Type message..." style="flex:1;">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>
</div>

<script>
let ws;
let myName = "";
let currentReceiver = "";

// 🔥 CONNECT
function connect() {
    myName = document.getElementById("name").value;
    let lang = document.getElementById("lang").value;

    if (!myName) {
        alert("Enter name first!");
        return;
    }

    ws = new WebSocket("wss://globalchat-rdsz.onrender.com/ws");

    ws.onopen = function() {
        ws.send(JSON.stringify({
            name: myName,
            lang: lang
        }));
    };

    ws.onmessage = function(event) {
        let chatBox = document.getElementById("chatBox");

        let msg = event.data;
        let sender = msg.split(":")[0].trim();

        // 🔥 ADD CONTACT
        addUser(sender);

        let isMe = (sender === myName);

        let div = document.createElement("div");
        div.classList.add("msg");
        div.classList.add(isMe ? "me" : "other");

        div.innerText = msg;

        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    };
}

// 🔥 ADD USER TO LIST
function addUser(name) {
    if (name === myName) return;

    let list = document.getElementById("usersList");

    if (!document.getElementById("user_" + name)) {
        let div = document.createElement("div");
        div.id = "user_" + name;
        div.classList.add("user");
        div.innerText = name;

        div.onclick = function() {
            currentReceiver = name;

            // highlight selected
            document.querySelectorAll(".user").forEach(u => u.classList.remove("active"));
            div.classList.add("active");
        };

        list.appendChild(div);
    }
}

// 🔥 SEND MESSAGE
function sendMessage() {
    let message = document.getElementById("message").value;

    if (!message || !currentReceiver) {
        alert("Select a user first!");
        return;
    }

    ws.send(JSON.stringify({
        sender: myName,
        receiver: currentReceiver,
        message: message
    }));

    document.getElementById("message").value = "";
}
</script>

</body>
</html>
