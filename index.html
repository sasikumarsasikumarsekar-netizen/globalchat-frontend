<!DOCTYPE html>
<html>
<head>
    <title>GlobalChat 🌍</title>

    <style>
        body { font-family: Arial; margin:0; background:#ece5dd; }
        .header { background:#075E54; color:white; padding:15px; }
        .top { padding:10px; background:#f0f0f0; }

        .container { display:flex; height:90vh; }

        .contacts {
            width:25%;
            background:white;
            border-right:1px solid #ccc;
            overflow-y:auto;
        }

        .contact {
            padding:10px;
            border-bottom:1px solid #eee;
            cursor:pointer;
        }

        .contact:hover { background:#f5f5f5; }

        .chat-area {
            width:75%;
            display:flex;
            flex-direction:column;
        }

        .chat-box {
            flex:1;
            overflow-y:auto;
            padding:10px;
            background:#e5ddd5;
        }

        .msg {
            padding:10px;
            margin:5px;
            border-radius:10px;
            max-width:60%;
        }

        .me {
            background:#dcf8c6;
            margin-left:auto;
        }

        .other {
            background:white;
        }

        .input-box {
            display:flex;
            padding:10px;
            background:#f0f0f0;
        }

        input, select { padding:8px; margin-right:5px; }

        button {
            padding:8px 15px;
            background:#25D366;
            color:white;
            border:none;
        }
    </style>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body>

<div class="header">🌍 GlobalChat (Auto Translation)</div>

<div class="top">
    <input id="name" placeholder="Your Name">

    <select id="lang">
        <option value="en">English</option>
        <option value="ta">Tamil</option>
        <option value="hi">Hindi</option>
    </select>

    <button onclick="connect()">Connect</button>
</div>

<div class="container">
    <div class="contacts" id="contacts"></div>

    <div class="chat-area">
        <div class="chat-box" id="chatBox"></div>

        <div class="input-box">
            <input id="message" placeholder="Type message..." style="flex:1;">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyA6hyqYaNGK87vLRQBDuQqrcUS3psn52sA",
  authDomain: "globalchat-1e2d3.firebaseapp.com",
  databaseURL: "https://globalchat-1e2d3-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "globalchat-1e2d3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName = "";
let selectedUser = "";
let myLang = "en";

// CONNECT
function connect() {
    myName = document.getElementById("name").value;
    myLang = document.getElementById("lang").value;

    if (!myName) {
        alert("Enter name!");
        return;
    }

    // 🔥 Save user + language
    db.ref("users/" + myName).set({
        online: true,
        lang: myLang
    });

    // 🔥 Users list
    db.ref("users").on("value", snapshot => {
        let users = snapshot.val() || {};
        let contacts = document.getElementById("contacts");
        contacts.innerHTML = "";

        let userList = Object.keys(users);

        userList.forEach(user => {
            if (user === myName) return;

            let div = document.createElement("div");
            div.innerText = user;
            div.className = "contact";

            div.onclick = () => {
                selectedUser = user;
                highlight(div);
            };

            contacts.appendChild(div);
        });

        if (!selectedUser && userList.length > 1) {
            selectedUser = userList.find(u => u !== myName);
        }
    });

    // 🔥 Messages listener
    db.ref("messages").on("child_added", async snapshot => {
        let msg = snapshot.val();

        if (
            (msg.sender === myName && msg.receiver === selectedUser) ||
            (msg.sender === selectedUser && msg.receiver === myName)
        ) {
            let translated = await translate(msg.text, msg.senderLang, myLang);
            showMessage(msg.sender, translated);
        }
    });
}

// 🔥 TRANSLATION
async function translate(text, from, to) {
    if (from === to) return text;

    let url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`;

    let res = await fetch(url);
    let data = await res.json();

    return data[0][0][0];
}

// SEND MESSAGE
function sendMessage() {
    let text = document.getElementById("message").value;

    if (!text) return;

    if (!selectedUser) {
        alert("No users online!");
        return;
    }

    db.ref("messages").push({
        sender: myName,
        receiver: selectedUser,
        text: text,
        senderLang: myLang
    });

    document.getElementById("message").value = "";
}

// SHOW MESSAGE
function showMessage(sender, text) {
    let chat = document.getElementById("chatBox");

    let div = document.createElement("div");
    div.classList.add("msg");
    div.classList.add(sender === myName ? "me" : "other");

    div.innerText = sender + ": " + text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// HIGHLIGHT USER
function highlight(div) {
    document.querySelectorAll(".contact").forEach(c => c.style.background = "white");
    div.style.background = "#d0f0c0";
}
</script>

</body>
</html>
